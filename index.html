<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Matheus Silva | Reveal Mask</title>

    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; }



        .container {

            position: relative;

            width: 100vw;

            height: 100vh;

            cursor: none; /* Esconde o mouse para a lanterna ser o guia */

        }



        /* CAMADA 1: VIKING (FUNDO SEMPRE VISÍVEL) */

        .viking-layer {

            position: absolute;

            top: 0; left: 0;

            width: 100%; height: 100%;

            background-image: url('viking.png'); 

            background-size: cover;

            background-position: center;

            z-index: 1; /* Fica por baixo */

        }



        /* CAMADA 2: ROBÔ (POR CIMA, SENDO REVELADO) */

        .robo-layer {

            position: absolute;

            top: 0; left: 0;

            width: 100%; height: 100%;

            background-image: url('robo2.png'); 

            background-size: cover;

            background-position: center;

            z-index: 2; /* Fica por cima */

            

            /* A máscara começa escondendo o robô inteiro */

            -webkit-mask-image: radial-gradient(circle 0px at center, black 100%, transparent 100%);

            mask-image: radial-gradient(circle 0px at center, black 100%, transparent 100%);

            -webkit-mask-repeat: no-repeat;

            mask-repeat: no-repeat;

        }

    </style>

</head>

<body>



    <div class="container" id="container">

        <div class="viking-layer"></div>

        <div class="robo-layer" id="roboLayer"></div>

    </div>



    <script>

        const container = document.getElementById('container');

        const roboLayer = document.getElementById('roboLayer');



        container.addEventListener('mousemove', (e) => {

            const x = e.clientX;

            const y = e.clientY;



            // O Robô só aparece onde o círculo "black" da máscara está. 

            // O resto fica transparente, mostrando o Viking que está atrás.

            const mask = `radial-gradient(circle 200px at ${x}px ${y}px, black 0%, transparent 100%)`;

            

            roboLayer.style.webkitMaskImage = mask;

            roboLayer.style.maskImage = mask;

        });



        // Quando o mouse sai, o Robô desaparece totalmente

        container.addEventListener('mouseleave', () => {

            const hiddenMask = `radial-gradient(circle 0px at center, black 100%, transparent 100%)`;

            roboLayer.style.webkitMaskImage = hiddenMask;

            roboLayer.style.maskImage = hiddenMask;

        });

    </script>

</body>

</html>
