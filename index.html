<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matheus Silva</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: none;
        }

        /* CAMADA 1: VIKING (FUNDO) */
        .viking-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('viking.png'); 
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* CAMADA 2: ROBÔ (REVELAÇÃO) */
        .robo-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('robo2.png'); 
            background-size: cover;
            background-position: center;
            z-index: 2;
            -webkit-mask-image: radial-gradient(circle 0px at center, black 100%, transparent 100%);
            mask-image: radial-gradient(circle 0px at center, black 100%, transparent 100%);
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
        }

        /* CAMADA 3: NEVE (POR CIMA DE TUDO) */
        #snowCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10; /* Fica acima das imagens */
            pointer-events: none; /* Deixa o mouse passar para o efeito de máscara funcionar */
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="viking-layer"></div>
        <div class="robo-layer" id="roboLayer"></div>
        <canvas id="snowCanvas"></canvas>
    </div>

    <script>
        // --- LÓGICA DO EFEITO DE REVELAÇÃO ---
        const container = document.getElementById('container');
        const roboLayer = document.getElementById('roboLayer');

        container.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            const mask = `radial-gradient(circle 200px at ${x}px ${y}px, black 0%, transparent 100%)`;
            roboLayer.style.webkitMaskImage = mask;
            roboLayer.style.maskImage = mask;
        });

        container.addEventListener('mouseleave', () => {
            const hiddenMask = `radial-gradient(circle 0px at center, black 100%, transparent 100%)`;
            roboLayer.style.webkitMaskImage = hiddenMask;
            roboLayer.style.maskImage = hiddenMask;
        });

        // --- LÓGICA DA NEVE CAINDO ---
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, flakes = [];

        function initSnow() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            flakes = [];
            for (let i = 0; i < 150; i++) {
                flakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 3 + 1,
                    speed: Math.random() * 1 + 0.5,
                    opacity: Math.random() * 0.8
                });
            }
        }

        function drawSnow() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "white";
            
            flakes.forEach(flake => {
                ctx.beginPath();
                ctx.arc(flake.x, flake.y, flake.size, 0, Math.PI * 2);
                ctx.globalAlpha = flake.opacity;
                ctx.fill();
                
                flake.y += flake.speed;
                flake.x += Math.sin(flake.y / 50);
