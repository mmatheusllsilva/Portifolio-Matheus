<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matheus Silva | Rastro Suave Refinado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: crosshair; /* Cursor mais temático */
        }

        /* CAMADA 1: VIKING (FUNDO FIXO, SEMPRE VISÍVEL) */
        .viking-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('viking.png'); /* Nome exato do seu arquivo */
            background-size: cover;
            background-position: center;
            z-index: 1; /* Fica por baixo */
        }

        /* CAMADA 2: ROBÔ (POR CIMA, SENDO REVELADO) */
        .robo-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('robo2.png'); /* Nome exato do seu arquivo */
            background-size: cover;
            background-position: center;
            z-index: 2; /* Fica por cima */
            
            /* A MÁGICA: Usamos o Canvas diretamente como máscara */
            mask-image: url(#maskCanvas); 
            -webkit-mask-image: url(#maskCanvas);
            mask-size: cover;
            -webkit-mask-size: cover;
        }

        /* O CANVAS (ONDE DESENHAMOS O RASTRO) */
        #maskCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10; /* Canvas fica visível mas transparente ao mouse */
            pointer-events: none; /* Mouse passa através dele */
            opacity: 0; /* Esconde o canvas visualmente */
        }

    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="viking-layer"></div>
        
        <div class="robo-layer" id="roboLayer"></div>
        
        <canvas id="maskCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('maskCanvas');
        const ctx = canvas.getContext('2d');
        const roboLayer = document.getElementById('roboLayer');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Preenche o canvas com PRETO (Oculta o Robô, Mostra o Viking)
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        window.addEventListener('resize', resize);
        resize();

        let mouseX = -500;
        let mouseY = -500;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animate() {
            // 1. O rastro: Pinta um preto bem suave por cima para "apagar" o rastro devagar
            // 0.03 = rastro bem longo | 0.1 = rastro curto
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.03)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. A circunferência com DEGRADÊ (Lanterna)
            // Usamos 'source-over' e pintamos em branco para criar o "buraco" de revelação
            ctx.globalCompositeOperation = 'source-over';
            const gradient = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 200);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)'); // Centro totalmente visível (Robô puro)
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)'); // Borda some suavemente (Viking puro)

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 200, 0, Math.PI * 2); // Tamanho da circunferência
            ctx.fill();

            // 3. Aplica o canvas como máscara via CSS
            // O navegador lê o canvas: onde é BRANCO (rastro), o Robô aparece.
            // Onde é PRETO (fundo), o Viking aparece.
            roboLayer.style.maskImage = `url(#maskCanvas)`;
            roboLayer.style.webkitMaskImage = `url(#maskCanvas)`;

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
