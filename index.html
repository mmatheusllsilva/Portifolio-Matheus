<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matheus Silva</title>
    <style>
        /* RESETS E BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #0d1117; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        /* CONTAINER PRINCIPAL */
        .reveal-wrapper {
            position: relative;
            width: 350px; /* Tamanho da imagem do viking/robô */
            height: 350px;
            border-radius: 50%; /* Mantém o formato circular do seu portfólio anterior */
            overflow: hidden; /* Corta o excesso */
            cursor: pointer; /* Cursor de mão para indicar interação */
            box-shadow: 0 0 35px rgba(139, 92, 246, 0.4);
            transition: box-shadow 0.3s ease;
            z-index: 10;
        }

        .reveal-wrapper:hover {
            box-shadow: 0 0 65px rgba(139, 92, 246, 0.8);
        }

        /* 1. IMAGEM DO ROBÔ (A REVELADA) */
        .reveal-robo {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('robo.png'); /* Sua imagem do robô */
            background-size: cover;
            background-position: center;
            opacity: 0; /* Começa oculta */
            transition: opacity 0.5s ease-in-out; /* Transição suave */
            z-index: 1; /* Fica no meio */
        }

        /* 2. IMAGEM DO VIKING (A DE CIMA) */
        .reveal-viking {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('viking.png'); /* Sua imagem do viking */
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            opacity: 1; /* Começa visível */
            transition: opacity 0.5s ease-in-out; /* Transição suave */
            z-index: 2; /* Fica no topo */
        }

        /* O EFEITO AO PASSAR O MOUSE (HOVER) */
        .reveal-wrapper:hover .reveal-robo {
            opacity: 1; /* Revela o robô */
        }

        .reveal-wrapper:hover .reveal-viking {
            opacity: 0.2; /* Quase esconde o viking (mantém uma sombra sutil) */
        }

    </style>
</head>
<body>

    <div class="reveal-wrapper">
        <div class="reveal-robo"></div>
        <div class="reveal-viking"></div>
    </div>

</body>
</html>
