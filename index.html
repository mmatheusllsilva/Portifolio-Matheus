<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matheus Silva | Reveal Mask</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* CAMADA 1: VIKING (FICA FIXA NO FUNDO) */
        .viking-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('viking.png'); 
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* CAMADA 2: ROBÔ (FICA POR CIMA COM A MÁSCARA) */
        .robo-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('robo2.png'); 
            background-size: cover;
            background-position: center;
            z-index: 2;
            
            /* Máscara invisível por padrão */
            -webkit-mask-image: radial-gradient(circle 150px at center, black 100%, transparent 100%);
            mask-image: radial-gradient(circle 150px at center, black 100%, transparent 100%);
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            
            /* Esconde a camada do robô fora do círculo */
            -webkit-mask-composite: destination-in;
            mask-composite: intersect;
            
            display: none; /* Só aparece quando o mouse entra */
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="viking-layer"></div>
        <div class="robo-layer" id="roboLayer"></div>
    </div>

    <script>
        const container = document.getElementById('container');
        const roboLayer = document.getElementById('roboLayer');

        container.addEventListener('mousemove', (e) => {
            roboLayer.style.display = 'block';
            const x = e.clientX;
            const y = e.clientY;

            // Cria o efeito de "lanterna" revelando o robô
            const mask = `radial-gradient(circle 180px at ${x}px ${y}px, black 0%, transparent 100%)`;
            
            roboLayer.style.webkitMaskImage = mask;
            roboLayer.style.maskImage = mask;
        });

        container.addEventListener('mouseleave', () => {
            roboLayer.style.display = 'none';
        });
    </script>
</body>
</html>
