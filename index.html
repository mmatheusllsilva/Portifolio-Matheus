<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matheus Silva | Rastro Viking</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
    </style>
</head>
<body>

    <canvas id="portfolioCanvas"></canvas>

    <script>
        const canvas = document.getElementById('portfolioCanvas');
        const ctx = canvas.getContext('2d');

        const imgViking = new Image();
        const imgRobo = new Image();
        
        // Carregamento das imagens
        imgViking.src = 'viking.png'; 
        imgRobo.src = 'robo2.png';

        let mouseX = -500;
        let mouseY = -500;
        let imagesLoaded = 0;

        function checkLoaded() {
            imagesLoaded++;
            if (imagesLoaded === 2) animate();
        }

        imgViking.onload = checkLoaded;
        imgRobo.onload = checkLoaded;

        // Canvas secundário para o rastro (a "máscara de lesma")
        const trailCanvas = document.createElement('canvas');
        const tctx = trailCanvas.getContext('2d');

        function resize() {
            canvas.width = trailCanvas.width = window.innerWidth;
            canvas.height = trailCanvas.height = window.innerHeight;
            tctx.fillStyle = 'black';
            tctx.fillRect(0, 0, trailCanvas.width, trailCanvas.height);
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        resize();

        function animate() {
            // 1. Atualiza o rastro no canvas auxiliar
            tctx.globalCompositeOperation = 'source-over';
            tctx.fillStyle = 'rgba(0, 0, 0, 0.03)'; // Velocidade do rastro
            tctx.fillRect(0, 0, trailCanvas.width, trailCanvas.height);

            // Desenha a circunferência com degradê no rastro
            const grad = tctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 200);
            grad.addColorStop(0, 'white');
            grad.addColorStop(1, 'transparent');
            
            tctx.fillStyle = grad;
            tctx.beginPath();
            tctx.arc(mouseX, mouseY, 200, 0, Math.PI * 2);
            tctx.fill();

            // 2. Renderiza no canvas principal
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenha o VIKING primeiro (Fundo)
            ctx.drawImage(imgViking, 0, 0, canvas.width, canvas.height);

            // Desenha o ROBÔ apenas onde o rastro está (Máscara)
            ctx.globalCompositeOperation = 'destination-in'; 
            // O comando acima faz com que o que vier depois sirva de máscara para o que já está no canvas
            // Mas para o seu efeito, vamos usar o modo 'source-over' com a máscara pronta
            
            // Lógica de Composição:
            ctx.save();
            ctx.globalCompositeOperation = 'source-over';
            
            // Criamos um canvas temporário para combinar Robo + Rastro
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            
            tempCtx.drawImage(imgRobo, 0, 0, canvas.width, canvas.height);
            tempCtx.globalCompositeOperation = 'destination-in';
            tempCtx.drawImage(trailCanvas, 0, 0);
            
            ctx.drawImage(tempCanvas, 0, 0);
            ctx.restore();

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
