<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matheus Silva | Efeito Rastro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: crosshair; /* Cursor estiloso para o tema viking */
        }

        /* CAMADA 1: VIKING (FUNDO FIXO) */
        .viking-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('viking.png'); 
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* CAMADA 2: ROBÔ (COM O EFEITO DE RASTRO) */
        .robo-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('robo2.png'); 
            background-size: cover;
            background-position: center;
            z-index: 2;
            pointer-events: none; /* Deixa o mouse passar através para o container */
            
            /* Máscara inicial */
            -webkit-mask-image: radial-gradient(circle 200px at -500px -500px, black 0%, transparent 80%);
            mask-image: radial-gradient(circle 200px at -500px -500px, black 0%, transparent 80%);
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="viking-layer"></div>
        <div class="robo-layer" id="roboLayer"></div>
    </div>

    <script>
        const roboLayer = document.getElementById('roboLayer');
        
        // Posição real do mouse
        let mouseX = -500;
        let mouseY = -500;
        
        // Posição da "máscara" (que vai perseguir o mouse)
        let maskX = -500;
        let maskY = -500;

        // Fator de lentidão (Quanto menor o número, mais parece uma "lesma")
        // 0.05 é bem lento e fluido. 0.1 é um pouco mais rápido.
        const speed = 0.05; 

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animate() {
            // Cálculo de Interpolação Linear (Lerp)
            // A posição da máscara caminha uma fração da distância até o mouse em cada frame
            maskX += (mouseX - maskX) * speed;
            maskY += (mouseY - maskY) * speed;

            const mask = `radial-gradient(circle 200px at ${maskX}px ${maskY}px, black 0%, transparent 80%)`;
            
            roboLayer.style.webkitMaskImage = mask;
            roboLayer.style.maskImage = mask;

            // Executa a função novamente no próximo frame (60fps)
            requestAnimationFrame(animate);
        }

        // Inicia a animação
        animate();
    </script>
</body>
</html>
