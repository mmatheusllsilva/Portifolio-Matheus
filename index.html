<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matheus Silva | Rastro Suave</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }

        /* CAMADA 1: VIKING (A BASE FIXA) */
        .viking-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('viking.png'); 
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* CAMADA 2: ROBÔ (A REVELAÇÃO) */
        .robo-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('robo2.png'); 
            background-size: cover;
            background-position: center;
            z-index: 2;
            /* Usamos o canvas como máscara via CSS */
            -webkit-mask-image: none; 
            mask-image: none;
        }

        /* O CANVAS QUE VAI DEFINIR A OPACIDADE DO ROBÔ */
        #maskCanvas {
            display: none; /* Ele trabalha apenas nos bastidores */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="viking-layer"></div>
        <canvas id="uiCanvas" style="position:absolute; top:0; left:0; z-index:3; width:100%; height:100%; pointer-events:none;"></canvas>
        <div class="robo-layer" id="roboLayer"></div>
    </div>

    <canvas id="maskCanvas"></canvas>

    <script>
        const maskCanvas = document.getElementById('maskCanvas');
        const mctx = maskCanvas.getContext('2d');
        const roboLayer = document.getElementById('roboLayer');

        let mouseX = -500;
        let mouseY = -500;

        function resize() {
            maskCanvas.width = window.innerWidth;
            maskCanvas.height = window.innerHeight;
            // Começa tudo preto (Viking visível, Robô escondido)
            mctx.fillStyle = 'black';
            mctx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        resize();

        function draw() {
            // 1. O rastro: Pinta um preto bem suave por cima para apagar o branco devagar
            // 0.03 = rastro bem longo | 0.1 = rastro curto
            mctx.globalCompositeOperation = 'source-over';
            mctx.fillStyle = 'rgba(0, 0, 0, 0.03)'; 
            mctx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);

            // 2. A circunferência com DEGRADÊ
            const gradient = mctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 180);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)'); // Centro totalmente visível
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)'); // Borda some suavemente

            mctx.globalCompositeOperation = 'source-over';
            mctx.fillStyle = gradient;
            mctx.beginPath();
            mctx.arc(mouseX, mouseY, 180, 0, Math.PI * 2);
            mctx.fill();

            // 3. Aplica o canvas como máscara no Robô
            // No modo 'mask', o que é BRANCO mostra o Robô, o que é PRETO mostra o Viking
            const maskData = maskCanvas.toDataURL();
            roboLayer.style.webkitMaskImage = `url(${maskData})`;
            roboLayer.style.maskImage = `url(${maskData})`;

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
