<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matheus Silva | IA & Automação</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; color: white; }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: none;
        }

        /* CAMADAS DE FUNDO */
        .viking-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('viking.png'); 
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .robo-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('robo2.png'); 
            background-size: cover;
            background-position: center;
            z-index: 2;
            -webkit-mask-image: radial-gradient(circle 0px at center, black 100%, transparent 100%);
            mask-image: radial-gradient(circle 0px at center, black 100%, transparent 100%);
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
        }

        /* UI - MENU SUPERIOR */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100; /* Acima de tudo */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        nav .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 1px; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav ul li a { color: white; text-decoration: none; font-size: 0.9rem; transition: 0.3s; opacity: 0.8; }
        nav ul li a:hover { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* UI - CHAT IA (LADO ESQUERDO) */
        .chat-ai {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 320px;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .chat-header {
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
            font-weight: bold;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            font-size: 0.85rem;
            line-height: 1.4;
            overflow-y: auto;
            color: rgba(255, 255, 255, 0.9);
        }

        .chat-input {
            padding: 15px;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            padding: 8px;
            color: white;
            font-size: 0.8rem;
            outline: none;
        }

        .chat-input button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 0 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .chat-input button:hover { background: rgba(255, 255, 255, 0.3); }

    </style>
</head>
<body>

    <nav>
        <div class="logo">Matheus Lopes</div>
        <ul>
            <li><a href="#sobre">Sobre</a></li>
            <li><a href="#projetos">Projetos</a></li>
            <li><a href="#contato">Contato</a></li>
        </ul>
    </nav>

    <div class="container" id="container">
        <div class="viking-layer"></div>
        <div class="robo-layer" id="roboLayer"></div>
        
        <div class="chat-ai">
            <div class="chat-header">Matheus.AI - Assistente</div>
            <div class="chat-messages">
                Olá! Sou o assistente virtual do Matheus Silva. Como posso ajudar você hoje a conhecer o trabalho dele com IA e Automação?
            </div>
            <div class="chat-input">
                <input type="text" placeholder="Digite sua pergunta...">
                <button>➤</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const roboLayer = document.getElementById('roboLayer');

        // Impede que o clique no chat ou menu interfira na máscara se desejar, 
        // mas aqui mantemos o cursor customizado funcionando.
        container.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            const mask = `radial-gradient(circle 200px at ${x}px ${y}px, black 0%, transparent 100%)`;
            roboLayer.style.webkitMaskImage = mask;
            roboLayer.style.maskImage = mask;
        });

        container.addEventListener('mouseleave', () => {
            const hiddenMask = `radial-gradient(circle 0px at center, black 100%, transparent 100%)`;
            roboLayer.style.webkitMaskImage = hiddenMask;
            roboLayer.style.maskImage = hiddenMask;
        });
    </script>
</body>
</html>
