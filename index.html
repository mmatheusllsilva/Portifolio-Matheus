<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matheus Silva | IA & Automação</title>
    <style>
        :root {
            --glass: rgba(10, 15, 20, 0.75);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #00d1ff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; color: white; }

        @keyframes fadeInPage {
            from { opacity: 0; filter: blur(10px); }
            to { opacity: 1; filter: blur(0); }
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            animation: fadeInPage 1.5s ease-out;
            perspective: 1000px;
            cursor: default; /* Garante que o mouse apareça sempre */
        }

        .viking-layer, .robo-layer {
            position: absolute;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            background-size: cover;
            background-position: center;
            /* Suaviza o movimento do parallax */
            transition: transform 0.2s cubic-bezier(0.2, 0.49, 0.32, 0.99); 
        }

        .viking-layer { background-image: url('viking.png'); z-index: 1; }
        .robo-layer {
            background-image: url('robo2.png'); 
            z-index: 2;
            -webkit-mask-image: radial-gradient(circle 0px at center, black 100%, transparent 100%);
            mask-image: radial-gradient(circle 0px at center, black 100%, transparent 100%);
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
        }

        nav {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            padding: 30px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .logo { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; }
        nav ul { display: flex; list-style: none; gap: 40px; }
        nav ul li a { 
            color: white; text-decoration: none; font-size: 0.75rem; 
            text-transform: uppercase; letter-spacing: 2px;
            opacity: 0.5; transition: 0.4s;
        }
        nav ul li a:hover { opacity: 1; color: var(--accent); }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .chat-ai {
            position: absolute;
            bottom: 50px; 
            right: 50px;
            width: 340px;
            background: var(--glass); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            animation: slideUp 1s ease-out 0.5s backwards;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
        }

        .chat-messages { 
            padding: 24px; 
            font-size: 0.95rem; 
            line-height: 1.6; 
            color: white;
        }

        .chat-input { 
            padding: 20px; 
            display: flex; 
            gap: 12px; 
            background: rgba(0, 0, 0, 0.2); 
            border-radius: 0 0 24px 24px;
        }

        .chat-input input {
            flex: 1; background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; padding: 12px; color: white; outline: none;
        }

        .chat-input button {
            background: var(--accent); border: none; padding: 0 15px;
            border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        .chat-input button:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--accent); }

        .vignette {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.7) 100%);
            z-index: 5;
            pointer-events: none;
        }

        /* Ajuste Mobile */
        @media (max-width: 768px) {
            .chat-ai { width: calc(100% - 40px); right: 20px; bottom: 20px; }
            nav { padding: 20px; }
            nav ul { display: none; } /* Esconde o menu no mobile para focar na imagem */
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Matheus Lopes</div>
        <ul>
            <li><a href="#">Showcase</a></li>
            <li><a href="#">Experiência</a></li>
            <li><a href="#">Conexão</a></li>
        </ul>
    </nav>

    <div class="vignette"></div>

    <div class="container" id="container">
        <div class="viking-layer" id="viking"></div>
        <div class="robo-layer" id="roboLayer"></div>
        
        <div class="chat-ai">
            <div class="chat-header">// Assistente Neural</div>
            <div class="chat-messages">
                O show começou. Explore a fusão entre a força bruta do passado e a inteligência do futuro.
            </div>
            <div class="chat-input">
                <input type="text" placeholder="Inicie o protocolo...">
                <button>➤</button>
            </div>
        </div>
    </div>

    <script>
        const roboLayer = document.getElementById('roboLayer');
        const viking = document.getElementById('viking');

        window.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;

            // Efeito de Máscara
            const mask = `radial-gradient(circle 220px at ${x}px ${y}px, black 0%, transparent 100%)`;
            roboLayer.style.webkitMaskImage = mask;
            roboLayer.style.maskImage = mask;

            // Efeito Parallax Suave
            const moveX = (x - window.innerWidth / 2) / 60;
            const moveY = (y - window.innerHeight / 2) / 60;
            
            viking.style.transform = `translate(${moveX}px, ${moveY}px)`;
            roboLayer.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body>
</html>
